name: 初始化：推送新版 yml 到各存档仓库（一次性运行）

on:
  workflow_dispatch:

jobs:
  sync-ymls:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
      BASE_URL: https://raw.githubusercontent.com/sjshb57/IncandescenceArchiver/main/.github/workflows

    steps:
      - name: 拉取最新三个 yml
        run: |
          curl -fsSL "${BASE_URL}/setup.yml"     -o /tmp/setup.yml
          curl -fsSL "${BASE_URL}/update.yml"    -o /tmp/update.yml
          curl -fsSL "${BASE_URL}/retry_all.yml" -o /tmp/retry_all.yml
          echo "✅ 三个 yml 已拉取"
          wc -l /tmp/setup.yml /tmp/update.yml /tmp/retry_all.yml

      - name: 获取仓库列表
        id: repos
        run: |
          REPOS=""
          PAGE=1
          while true; do
            BATCH=$(curl -sf \
              "https://api.github.com/orgs/TwitterArchiver/repos?type=public&per_page=100&page=${PAGE}" \
              -H "Authorization: token ${GH_TOKEN}" \
              | jq -r '.[].name | select(. != "Dispatcher")' | sort)
            if [ -z "$BATCH" ]; then break; fi
            REPOS="${REPOS}${BATCH}"$'\n'
            PAGE=$((PAGE+1))
          done
          REPOS=$(echo "$REPOS" | grep -v '^$')
          echo "找到 $(echo "$REPOS" | wc -l) 个仓库"
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$REPOS"    >> $GITHUB_OUTPUT
          echo "EOF"       >> $GITHUB_OUTPUT

      - name: 推送 yml 到各仓库
        run: |
          push_file() {
            local REPO="$1"
            local FNAME="$2"
            local LOCAL="$3"
            local API="https://api.github.com/repos/TwitterArchiver/${REPO}/contents/.github/workflows/${FNAME}"

            # 获取现有 sha（文件不存在时为空）
            SHA=$(curl -sf -H "Authorization: token ${GH_TOKEN}" "$API" | jq -r '.sha // empty')

            # base64 编码（不换行）
            CONTENT=$(base64 -w 0 "$LOCAL")

            # 构造 JSON payload
            if [ -n "$SHA" ]; then
              PAYLOAD=$(jq -n \
                --arg msg "chore: 同步最新 ${FNAME} [skip ci]" \
                --arg content "$CONTENT" \
                --arg sha "$SHA" \
                '{message:$msg, content:$content, sha:$sha}')
            else
              PAYLOAD=$(jq -n \
                --arg msg "chore: 同步最新 ${FNAME} [skip ci]" \
                --arg content "$CONTENT" \
                '{message:$msg, content:$content}')
            fi

            STATUS=$(echo "$PAYLOAD" | curl -sf -o /dev/null -w "%{http_code}" \
              -X PUT "$API" \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary @-)

            if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
              echo "    ✅ ${FNAME} (HTTP ${STATUS})"
            else
              echo "    ❌ ${FNAME} 失败 (HTTP ${STATUS})"
            fi
          }

          while IFS= read -r REPO; do
            if [ -z "$REPO" ]; then continue; fi
            echo "→ ${REPO}"
            push_file "$REPO" "setup.yml"     "/tmp/setup.yml"
            push_file "$REPO" "update.yml"    "/tmp/update.yml"
            push_file "$REPO" "retry_all.yml" "/tmp/retry_all.yml"
            sleep 2
          done <<< "${{ steps.repos.outputs.list }}"

          echo "=== 全部完成 ==="
