name: 初始化：删除各仓库 cron + 推送新版 yml（一次性运行）

on:
  workflow_dispatch:

jobs:
  remove-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}

    steps:
      - name: 拉取最新三个 yml 模板
        run: |
          REPO_BASE="https://raw.githubusercontent.com/sjshb57/IncandescenceArchiver/main/.github/workflows"
          curl -fsSL "${REPO_BASE}/setup.yml"     -o /tmp/setup.yml
          curl -fsSL "${REPO_BASE}/update.yml"    -o /tmp/update.yml
          curl -fsSL "${REPO_BASE}/retry_all.yml" -o /tmp/retry_all.yml
          echo "✅ 三个 yml 已拉取"

      - name: 批量推送新版 yml 到各存档仓库
        run: |
          PAGE=1
          REPOS=()
          while true; do
            BATCH=$(curl -sf \
              "https://api.github.com/orgs/TwitterArchiver/repos?type=public&per_page=100&page=${PAGE}" \
              | python3 -c "
import sys, json
repos = [r['name'] for r in json.load(sys.stdin)
         if r['name'] not in ('Dispatcher',)]
repos.sort()
print('\n'.join(repos))
" 2>/dev/null || echo "")
            if [ -z "$BATCH" ]; then break; fi
            while IFS= read -r repo; do
              if [ -n "$repo" ]; then REPOS+=("$repo"); fi
            done <<< "$BATCH"
            PAGE=$((PAGE+1))
          done

          echo "共 ${#REPOS[@]} 个仓库"

          for REPO in "${REPOS[@]}"; do
            echo "→ 处理 ${REPO}..."

            python3 << PYEOF
import json, urllib.request, base64, re, os

token = os.environ['GH_TOKEN']
repo = "${REPO}"
headers = {
    "Authorization": f"token {token}",
    "Content-Type": "application/json",
    "Accept": "application/vnd.github.v3+json",
}

def push_yml(fname, local_path):
    url = f"https://api.github.com/repos/TwitterArchiver/{repo}/contents/.github/workflows/{fname}"
    with open(local_path, 'rb') as f:
        new_content = f.read()
    new_b64 = base64.b64encode(new_content).decode('ascii')

    # 获取现有 sha（如果文件存在）
    sha = None
    try:
        req = urllib.request.Request(url, headers=headers)
        resp = urllib.request.urlopen(req)
        data = json.loads(resp.read())
        sha = data['sha']
        old_content = base64.b64decode(data['content'])
        if old_content == new_content:
            print(f"  ✅ {fname} 无变化，跳过")
            return
    except urllib.error.HTTPError as e:
        if e.code != 404:
            print(f"  ⚠️ {fname} 获取失败: {e}")
            return

    payload = {"message": f"chore: 同步最新 {fname} [skip ci]", "content": new_b64}
    if sha:
        payload["sha"] = sha

    put_req = urllib.request.Request(url, data=json.dumps(payload).encode(), method='PUT', headers=headers)
    try:
        urllib.request.urlopen(put_req)
        print(f"  ✅ {fname} 已更新")
    except Exception as e:
        print(f"  ❌ {fname} 失败: {e}")

push_yml("setup.yml",     "/tmp/setup.yml")
push_yml("update.yml",    "/tmp/update.yml")
push_yml("retry_all.yml", "/tmp/retry_all.yml")
PYEOF
            sleep 2
          done

          echo "=== 全部处理完成 ==="
