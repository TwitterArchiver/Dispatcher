name: 初始化：推送新版 yml 到各存档仓库（一次性运行）

on:
  workflow_dispatch:

jobs:
  sync-ymls:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GITHUB_TOKEN: ${{ secrets.DISPATCH_TOKEN }}

    steps:
      - name: 从 project-starter（私有）拉取三个 yml 并推送到各仓库
        run: |
          # project-starter 是私有仓库，用 gh api 拉取（raw URL 无法访问私有）
          SRC="repos/TwitterArchiver/project-starter/contents/.github/workflows"
          for F in setup.yml update.yml retry_all.yml; do
            gh api "$SRC/$F" --jq '.content' | base64 -d > "/tmp/$F"
            if [ -s "/tmp/$F" ]; then
              echo "✅ 拉取 $F（$(wc -l < /tmp/$F) 行）"
            else
              echo "❌ 拉取 $F 失败"; exit 1
            fi
          done
          echo "三个 yml 拉取完成"

          push_file() {
            local REPO="$1" F="$2"
            local API="repos/TwitterArchiver/$REPO/contents/.github/workflows/$F"
            local SHA CONTENT
            SHA=$(gh api "$API" --jq '.sha' 2>/dev/null || true)
            CONTENT=$(base64 -w 0 "/tmp/$F")
            if [ -n "$SHA" ]; then
              jq -n --arg m "sync $F [skip ci]" --arg c "$CONTENT" --arg s "$SHA" \
                '{message:$m,content:$c,sha:$s}' | \
                gh api "$API" --method PUT --input - > /dev/null 2>&1 \
                && echo "  ✅ $F" || echo "  ❌ $F 失败"
            else
              jq -n --arg m "sync $F [skip ci]" --arg c "$CONTENT" \
                '{message:$m,content:$c}' | \
                gh api "$API" --method PUT --input - > /dev/null 2>&1 \
                && echo "  ✅ $F（新建）" || echo "  ❌ $F 失败"
            fi
          }

          gh repo list TwitterArchiver --limit 200 --json name \
            --jq '.[].name | select(. != "Dispatcher" and . != ".github" and . != "home" and . != "AnIncanescence" and . != "project-starter")' \
            | sort | while IFS= read -r REPO; do
            if [ -z "$REPO" ]; then continue; fi

            HAS=$(gh api "repos/TwitterArchiver/$REPO/contents/.github/workflows/update.yml" \
              --jq '.sha' 2>/dev/null || true)
            if [ -z "$HAS" ]; then
              echo "⏭️  $REPO（无 yml，跳过）"
              continue
            fi

            echo "→ $REPO"
            push_file "$REPO" setup.yml
            push_file "$REPO" update.yml
            push_file "$REPO" retry_all.yml
            sleep 1
          done
          echo "=== 全部完成 ==="
