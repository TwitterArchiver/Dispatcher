name: 统一调度更新

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_all:
        description: '强制触发所有仓库（忽略分组）'
        required: false
        default: 'false'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}

    steps:
      - name: 获取组织仓库并按分组触发
        run: |
          FORCE_ALL="${{ github.event.inputs.force_all }}"
          DAY=$(date -u +%u)
          echo "今天：周${DAY}，force_all=${FORCE_ALL}"

          # 获取所有公开仓库（排除 Dispatcher），按字母排序
          REPOS=()
          PAGE=1
          while true; do
            BATCH=$(curl -sf \
              "https://api.github.com/orgs/TwitterArchiver/repos?type=public&per_page=100&page=${PAGE}" \
              -H "Authorization: token ${GH_TOKEN}" \
              | jq -r '.[].name | select(. != "Dispatcher")' | sort)
            if [ -z "$BATCH" ]; then break; fi
            while IFS= read -r repo; do
              if [ -n "$repo" ]; then REPOS+=("$repo"); fi
            done <<< "$BATCH"
            PAGE=$((PAGE+1))
          done

          TOTAL=${#REPOS[@]}
          echo "共 ${TOTAL} 个存档仓库"

          TRIGGERED=0
          DELAY=0
          for i in "${!REPOS[@]}"; do
            REPO="${REPOS[$i]}"
            REPO_DAY=$(( (i % 7) + 1 ))

            if [ "$FORCE_ALL" = "true" ] || [ "$REPO_DAY" -eq "$DAY" ]; then
              if [ "$DELAY" -gt 0 ]; then
                echo "等待 60 秒..."
                sleep 60
              fi
              echo "→ [周${REPO_DAY}组] 触发 TwitterArchiver/${REPO}"
              echo '{"ref":"main"}' | \
                gh api repos/TwitterArchiver/${REPO}/actions/workflows/update.yml/dispatches \
                --method POST --input - 2>/dev/null && \
                echo "  ✅ ${REPO}" || \
                echo "  ⚠️ ${REPO} 触发失败"
              TRIGGERED=$((TRIGGERED+1))
              DELAY=1
            fi
          done

          echo "本次触发 ${TRIGGERED}/${TOTAL} 个仓库"
